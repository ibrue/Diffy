<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diffy — Compression Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000; color: #ccc;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    font-size: 14px; line-height: 1.6;
    padding: 40px 20px;
    display: flex; flex-direction: column; align-items: center;
  }
  .container { width: 100%; max-width: 680px; }

  header { margin-bottom: 36px; }
  header h1 { font-family: 'Georgia', 'Times New Roman', serif; font-size: 64px; font-weight: 700; color: #aaa; letter-spacing: -2px; line-height: 1; }
  header p { color: #999; font-size: 11px; letter-spacing: 4px; margin-top: 6px; text-transform: uppercase; }

  /* INPUTS */
  .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 32px; }
  .inp-group label { display: block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #999; margin-bottom: 4px; }
  .inp-group input, .inp-group select {
    width: 100%; background: #000; color: #ccc;
    border: 1px solid #444; padding: 7px 10px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px;
    outline: none; appearance: none; -webkit-appearance: none;
  }
  .inp-group input:focus, .inp-group select:focus { border-color: #aaa; }
  .inp-group .slider-row { display: flex; align-items: center; gap: 8px; }
  .inp-group input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 2px; background: #333; outline: none; cursor: pointer; padding: 0; border: none;
  }
  .inp-group input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #888; cursor: pointer; }
  .inp-group input[type=range]::-moz-range-thumb { width: 12px; height: 12px; background: #888; border: none; cursor: pointer; }
  .sv { font-size: 12px; color: #bbb; min-width: 36px; text-align: right; }
  .inp-group.full { grid-column: span 2; }

  /* BIG CALLOUT */
  .callout {
    border: 1px solid #444; padding: 20px 24px; margin-bottom: 28px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 20px; flex-wrap: wrap;
  }
  .callout-item { text-align: center; }
  .callout-val { font-size: 32px; font-weight: bold; letter-spacing: -1px; line-height: 1; color: #bbb; }
  .callout-val.green { color: #7aaa7a; }
  .callout-val.yellow { color: #aaaa7a; }
  .callout-lbl { font-size: 10px; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

  /* COMPARISON TABLE */
  .cmp { width: 100%; border-collapse: collapse; margin-bottom: 28px; font-size: 13px; }
  .cmp th { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #999; text-align: left; padding: 0 0 8px 0; font-weight: normal; border-bottom: 1px solid #444; }
  .cmp th:not(:first-child) { text-align: right; }
  .cmp td { padding: 8px 0; border-bottom: 1px solid #222; vertical-align: top; }
  .cmp td:not(:first-child) { text-align: right; }
  .cmp .lbl { color: #aaa; font-size: 11px; }
  .cmp .val { color: #bbb; }
  .cmp .val.green { color: #7aaa7a; }
  .cmp .val.yellow { color: #aaaa7a; }
  .cmp .ratio { font-size: 10px; color: #888; margin-top: 2px; }

  /* BAR CHART */
  .bars { margin-bottom: 28px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-lbl { width: 52px; font-size: 10px; text-align: right; color: #999; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 14px; background: #0a0a0a; border: 1px solid #1a1a1a; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.25s ease; }
  .bar-fill.raw { background: #333; }
  .bar-fill.h265 { background: #aaaa7a; }
  .bar-fill.diffy { background: #7aaa7a; }
  .bar-sz { font-size: 11px; color: #999; width: 72px; flex-shrink: 0; text-align: right; }

  /* DETAILS TOGGLE */
  .details-toggle { font-size: 11px; color: #888; cursor: pointer; letter-spacing: 1px; margin-bottom: 12px; user-select: none; }
  .details-toggle:hover { color: #ccc; }
  .math-box {
    border: 1px solid #1a1a1a; padding: 14px 16px; background: #020202;
    white-space: pre; font-size: 11px; line-height: 1.8; color: #999;
    overflow-x: auto; margin-bottom: 28px; display: none;
  }
  .math-box.open { display: block; }

  a { color: #aaa; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Diffy</h1>
    <p>Compression calculator</p>
  </header>

  <!-- INPUTS -->
  <div class="inputs">
    <div class="inp-group">
      <label>Workers</label>
      <input type="number" id="workers" value="1000" min="1">
    </div>
    <div class="inp-group">
      <label>Hours / shift</label>
      <input type="number" id="hours" value="8" min="0.1" step="0.5">
    </div>
    <div class="inp-group">
      <label>Resolution</label>
      <select id="res">
        <option value="540">540p</option>
        <option value="720" selected>720p</option>
        <option value="1080">1080p</option>
      </select>
    </div>
    <div class="inp-group">
      <label>Network (Mbps, shared)</label>
      <input type="number" id="net" value="500" min="1" step="10">
    </div>
    <div class="inp-group">
      <label>Task repetitiveness</label>
      <div class="slider-row">
        <input type="range" id="rep" min="0" max="100" value="85">
        <span class="sv" id="rep-v">85%</span>
      </div>
    </div>
    <div class="inp-group">
      <label>Codec quality</label>
      <div class="slider-row">
        <input type="range" id="qual" min="1" max="100" value="20">
        <span class="sv" id="qual-v">20</span>
      </div>
    </div>
  </div>

  <!-- BIG CALLOUT -->
  <div class="callout">
    <div class="callout-item">
      <div class="callout-val green" id="c-ratio">—</div>
      <div class="callout-lbl">Diffy vs H.265</div>
    </div>
    <div class="callout-item">
      <div class="callout-val green" id="c-saved">—</div>
      <div class="callout-lbl">Upload hours saved / day</div>
    </div>
    <div class="callout-item">
      <div class="callout-val yellow" id="c-diffy">—</div>
      <div class="callout-lbl">Diffy / worker / shift</div>
    </div>
  </div>

  <!-- COMPARISON TABLE -->
  <table class="cmp">
    <thead>
      <tr>
        <th></th>
        <th>Per worker</th>
        <th>Factory total</th>
        <th>Upload time</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="lbl">Raw</td>
        <td><div class="val" id="t-raw-w">—</div></td>
        <td><div class="val" id="t-raw-f">—</div></td>
        <td><div class="val" id="t-raw-u">—</div></td>
      </tr>
      <tr>
        <td class="lbl">H.265</td>
        <td><div class="val yellow" id="t-h265-w">—</div><div class="ratio" id="t-h265-wr"></div></td>
        <td><div class="val yellow" id="t-h265-f">—</div></td>
        <td><div class="val yellow" id="t-h265-u">—</div></td>
      </tr>
      <tr>
        <td class="lbl">Diffy</td>
        <td><div class="val green" id="t-ego-w">—</div><div class="ratio" id="t-ego-wr"></div></td>
        <td><div class="val green" id="t-ego-f">—</div></td>
        <td><div class="val green" id="t-ego-u">—</div></td>
      </tr>
    </tbody>
  </table>

  <!-- BAR CHART -->
  <div class="bars">
    <div class="bar-row">
      <div class="bar-lbl">Raw</div>
      <div class="bar-track"><div class="bar-fill raw" id="b-raw" style="width:100%"></div></div>
      <div class="bar-sz" id="b-raw-l">—</div>
    </div>
    <div class="bar-row">
      <div class="bar-lbl">H.265</div>
      <div class="bar-track"><div class="bar-fill h265" id="b-h265" style="width:0"></div></div>
      <div class="bar-sz" id="b-h265-l">—</div>
    </div>
    <div class="bar-row">
      <div class="bar-lbl">Diffy</div>
      <div class="bar-track"><div class="bar-fill diffy" id="b-ego" style="width:0"></div></div>
      <div class="bar-sz" id="b-ego-l">—</div>
    </div>
  </div>

  <!-- DETAILS TOGGLE -->
  <div class="details-toggle" onclick="toggleDetails()">&#9654; show formula</div>
  <div class="math-box" id="math-box"></div>

  <!-- MEMORY -->
  <div class="callout" style="margin-top:0">
    <div class="callout-item">
      <div class="callout-val" id="c-mem-old" style="font-size:20px;color:#555;text-decoration:line-through">—</div>
      <div class="callout-lbl">old (batch median)</div>
    </div>
    <div class="callout-item" style="color:#555;font-size:20px">&rarr;</div>
    <div class="callout-item">
      <div class="callout-val green" id="c-mem-new" style="font-size:20px">—</div>
      <div class="callout-lbl">new (welford online)</div>
    </div>
    <div class="callout-item">
      <div class="callout-val green" id="c-mem-save" style="font-size:20px">—</div>
      <div class="callout-lbl">RAM saved during warmup</div>
    </div>
  </div>

  <div style="margin-top:8px;"><a href="/">&#8592; encoder</a></div>

</div>
<script>
const CANON_SIZE={540:{q20:80*1024,q50:200*1024,q80:450*1024},720:{q20:150*1024,q50:400*1024,q80:900*1024},1080:{q20:300*1024,q50:800*1024,q80:1800*1024}};
const H265_KBPS={540:500,720:1000,1080:2000};
const BG=200*1024;

function fmt(b){
  if(!isFinite(b))return'—';
  if(b<1024)return b.toFixed(0)+' B';
  if(b<1024**2)return(b/1024).toFixed(1)+' KB';
  if(b<1024**3)return(b/1024**2).toFixed(2)+' GB';
  return(b/1024**3).toFixed(2)+' TB';
}
function fmtGB(b){return(b/1024**3).toFixed(2)+' GB';}
function fmtTime(s){
  if(!isFinite(s))return'—';
  if(s<60)return s.toFixed(0)+'s';
  if(s<3600)return(s/60).toFixed(0)+'m';
  return(s/3600).toFixed(1)+'h';
}
function canonSz(res,q){
  const t=CANON_SIZE[res];
  if(q<=20)return t.q20;
  if(q<=50)return Math.round(t.q20+(q-20)/30*(t.q50-t.q20));
  if(q<=80)return Math.round(t.q50+(q-50)/30*(t.q80-t.q50));
  return Math.round(t.q80+(q-80)/20*(t.q80*0.5));
}
function pxCount(res){return{540:960*540,720:1280*720,1080:1920*1080}[res];}

function calc(){
  const W=+document.getElementById('workers').value||1000;
  const H=+document.getElementById('hours').value||8;
  const res=+document.getElementById('res').value||720;
  const net=+document.getElementById('net').value||500;
  const rep=+document.getElementById('rep').value/100;
  const q=+document.getElementById('qual').value||20;
  document.getElementById('rep-v').textContent=Math.round(rep*100)+'%';
  document.getElementById('qual-v').textContent=q;

  const secs=H*3600;
  const fps=30;
  const pxPerFrame=pxCount(res);
  const totalFrames=secs*fps;
  const cycleLen=5; // default 5s cycles
  const totalCycles=Math.round(secs/cycleLen);
  const nCanon=3;
  const nRepeat=Math.max(0,totalCycles-nCanon);

  const raw_w=pxPerFrame*3*totalFrames;
  const h265_w=(H265_KBPS[res]*1000/8)*secs;
  const cSz=canonSz(res,q);
  const dSz=cSz*0.15;
  const ego_w=BG+nCanon*cSz+nRepeat*(rep*4+(1-rep)*dSz);

  const raw_f=raw_w*W, h265_f=h265_w*W, ego_f=ego_w*W;
  const netBps=net*1e6;
  const up_raw=raw_f*8/netBps, up_h265=h265_f*8/netBps, up_ego=ego_f*8/netBps;
  const saved=up_h265-up_ego;
  const ratio=h265_f/ego_f;

  // Callout
  document.getElementById('c-ratio').textContent=ratio.toFixed(0)+'x';
  document.getElementById('c-saved').textContent=fmtTime(saved);
  document.getElementById('c-diffy').textContent=fmt(ego_w);

  // Table
  document.getElementById('t-raw-w').textContent=fmt(raw_w);
  document.getElementById('t-raw-f').textContent=fmtGB(raw_f);
  document.getElementById('t-raw-u').textContent=fmtTime(up_raw);
  document.getElementById('t-h265-w').textContent=fmt(h265_w);
  document.getElementById('t-h265-wr').textContent=Math.round(raw_w/h265_w)+'x smaller than raw';
  document.getElementById('t-h265-f').textContent=fmtGB(h265_f);
  document.getElementById('t-h265-u').textContent=fmtTime(up_h265);
  document.getElementById('t-ego-w').textContent=fmt(ego_w);
  document.getElementById('t-ego-wr').textContent=Math.round(h265_w/ego_w)+'x smaller than H.265';
  document.getElementById('t-ego-f').textContent=fmtGB(ego_f);
  document.getElementById('t-ego-u').textContent=fmtTime(up_ego);

  // Bars
  const maxB=raw_f;
  document.getElementById('b-raw').style.width='100%';
  document.getElementById('b-h265').style.width=(h265_f/maxB*100).toFixed(3)+'%';
  document.getElementById('b-ego').style.width=(ego_f/maxB*100).toFixed(3)+'%';
  document.getElementById('b-raw-l').textContent=fmtGB(raw_f);
  document.getElementById('b-h265-l').textContent=fmtGB(h265_f);
  document.getElementById('b-ego-l').textContent=fmtGB(ego_f);

  // Memory: old batch median vs new Welford
  const warmup=150;
  const frameBytes=pxPerFrame*3*4; // float32
  const memOld=warmup*frameBytes; // N×H×W×C stack
  const memNew=2*frameBytes; // mean + m2 accumulators
  document.getElementById('c-mem-old').textContent=fmt(memOld);
  document.getElementById('c-mem-new').textContent=fmt(memNew);
  document.getElementById('c-mem-save').textContent=Math.round(memOld/memNew)+'x less';

  // Math
  const qb=q<=20?'q20':q<=50?'q50':'q80';
  document.getElementById('math-box').textContent=[
    '  raw    = px/frame × 3 bytes × fps × seconds',
    `         = ${pxPerFrame.toLocaleString()} × 3 × ${fps} × ${secs}  =  ${fmt(raw_w)}`,
    '',
    `  h.265  = ${H265_KBPS[res]} kbps × ${secs}s / 8  =  ${fmt(h265_w)}`,
    '',
    '  diffy  = bg_jpeg (200 KB)',
    `         + ${nCanon} canonical × ${fmt(cSz)}  [CANON_SIZE[${res}p][${qb}]]`,
    `         + ${nRepeat} repeats × (${Math.round(rep*100)}% × 4B clone + ${Math.round((1-rep)*100)}% × ${fmt(dSz)} delta)`,
    `         = ${fmt(ego_w)}`,
    '',
    `  factory (${W} workers): diffy = ${fmtGB(ego_f)}`,
    `  upload @ ${net} Mbps: h.265 = ${fmtTime(up_h265)}  diffy = ${fmtTime(up_ego)}`,
    `  saved = ${fmtTime(saved)}`,
  ].join('\n');
}

function toggleDetails(){
  const box=document.getElementById('math-box');
  const tog=document.querySelector('.details-toggle');
  const open=box.classList.toggle('open');
  tog.textContent=(open?'▼':'▶')+' '+(open?'hide formula':'show formula');
}

['workers','hours','res','net','rep','qual'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('input',calc);
});
calc();
</script>
</body>
</html>
